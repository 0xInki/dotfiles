# =============================================================================
# TMUX CONFIGURATION - Configuração Moderna e Produtiva
# =============================================================================

# Prefix key - Ctrl+a (mais fácil que Ctrl+b)
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# =============================================================================
# CONFIGURAÇÕES BÁSICAS
# =============================================================================

# Renumeração automática de janelas
set -g base-index 1
setw -g pane-base-index 1

# Nome da window = nome do diretório atual
setw -g automatic-rename on
setw -g automatic-rename-format '#{b:pane_current_path}'

# Renumeração quando uma janela é fechada
set -g renumber-windows on

# Histórico maior
set -g history-limit 10000

# Tempo para comandos prefix
set -g repeat-time 300

# Mouse habilitado
set -g mouse on

# Foco automático
set -g focus-events on

# =============================================================================
# CONFIGURAÇÕES DE VISUAL
# =============================================================================

# Cores
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Status bar
set -g status-position top
# set -g status-bg colour235                              # ANTIGO
# set -g status-fg colour136                             # ANTIGO
# set -g status-left "#[fg=colour46]#S #[fg=colour39]#I #[fg=colour39]#P "   # ANTIGO
# set -g status-right "#[fg=colour39]%Y-%m-%d %H:%M #[fg=colour46]#(whoami)@#h"  # ANTIGO

# Gruvbox-material dark (medium)
set -g status-bg '#282828'
set -g status-fg '#d4be98'
set -g status-left-length 40
set -g status-left "#[fg=#a9b665]#S #[fg=#7daea3]#I #[fg=#7daea3]#P "
set -g status-right "#[fg=#7daea3]%Y-%m-%d %H:%M #[fg=#a9b665]#(whoami)@#h"
set -g status-right-length 60

# Janela ativa
# setw -g window-status-current-style "fg=white,bg=red"  # ANTIGO
setw -g window-status-current-style "fg=#1d2021,bg=#d8a657"
setw -g window-status-current-format " #I:#W#F "

# Janelas inativas
# setw -g window-status-style "fg=colour244"             # ANTIGO
setw -g window-status-style "fg=#928374"
setw -g window-status-format " #I:#W#F "

# Painéis
# set -g pane-border-style "fg=colour238"                # ANTIGO
# set -g pane-active-border-style "fg=colour51"          # ANTIGO
set -g pane-border-style "fg=#45403d"
set -g pane-active-border-style "fg=#d8a657"

# =============================================================================
# ATALHOS DE TECLADO
# =============================================================================

# Dividir painéis
bind = split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Navegação entre painéis
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Redimensionar painéis
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Navegação entre janelas
bind -r C-p select-window -t :-
bind -r C-n select-window -t :+

# Criar nova janela no diretório atual
bind c new-window -c "#{pane_current_path}"

# Renomear janela
bind , command-prompt -I "#W" "rename-window '%%'"

# Fechar window sem confirmação
bind q kill-session

# Mover painéis de posição
bind < swap-pane -U
bind > swap-pane -D

# Sincronizar painéis
bind S set-window-option synchronize-panes

# =============================================================================
# COPY MODE (modo de cópia melhorado)
# =============================================================================

# Usar vi keybindings no copy mode
setw -g mode-keys vi

# Cópia para clipboard do sistema (macOS)
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"

# Copiar ao soltar o mouse (sem precisar segurar Option)
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# =============================================================================
# PLUGINS (TPM - Tmux Plugin Manager)
# =============================================================================

# Instalar TPM se não existir
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm'"

# Lista de plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'sainnhe/tmux-fzf'

# Configurações dos plugins
set -g @resurrect-capture-pane-contents 'on'

# =============================================================================
# CONFIGURAÇÕES ESPECÍFICAS PARA DESENVOLVIMENTO
# =============================================================================

# Atalhos para desenvolvimento
bind f run-shell 'PANE=#{pane_id}; tmux display-popup -E "dir=\$(fd --type d --max-depth 4 . ~ | fzf --preview '\''ls {}'\'') && [ -n \"\$dir\" ] && tmux send-keys -t $PANE \"cd \\\"\$dir\\\"\" Enter"'

# =============================================================================
# INICIALIZAÇÃO DO TPM
# =============================================================================

# Inicializar TPM (manter no final do arquivo)
run '~/.tmux/plugins/tpm/tpm'
